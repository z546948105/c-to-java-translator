version: '3.8'

services:
  c-trans-java:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: c-trans-java
    ports:
      - "9988:9988"
    environment:
      - JAVA_OPTS=-Xms512m -Xmx1024m
      - SPRING_PROFILES_ACTIVE=prod
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
